name: Deploy & Test NetScaler VPX

on:
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region"
        type: string
        default: "eastus"
      vmSize:
        description: "VM size (must support 2 NICs)"
        type: string
        default: "Standard_D2s_v3"
      demoMode:
        description: "Generate sample test output without deploying"
        type: boolean
        default: false

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

jobs:
  # ============================================================
  # Job 1: Deploy VPX VM + VNet + TLS certs
  # ============================================================
  deploy:
    name: "Deploy VPX"
    if: ${{ !inputs.demoMode }}
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    outputs:
      mgmt_public_ip: ${{ steps.out.outputs.mgmt_public_ip }}
      vip_public_ip: ${{ steps.out.outputs.vip_public_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Create state storage
        run: |
          az group create -n rg-terraform-state -l ${{ inputs.location }} --output none 2>/dev/null || true
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          SA_NAME="stvpxstate${SUFFIX}"
          az storage account create -n "$SA_NAME" -g rg-terraform-state \
            -l ${{ inputs.location }} --sku Standard_LRS --output none 2>/dev/null || true
          az storage container create -n tfstate --account-name "$SA_NAME" \
            --output none 2>/dev/null || true
          echo "SA_NAME=$SA_NAME" >> "$GITHUB_ENV"

      - name: Accept marketplace terms
        run: az vm image terms accept --publisher citrix --offer netscalervpx-141 --plan netscalerbyol --output none

      - name: Terraform Init
        run: |
          cd terraform/deploy
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=deploy.tfstate"

      - name: Terraform Apply
        run: |
          cd terraform/deploy
          terraform apply -auto-approve -input=false \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}" \
            -var="rpc_password=${{ secrets.RPC_PASSWORD }}" \
            -var="location=${{ inputs.location }}" \
            -var="vm_size=${{ inputs.vmSize }}"

      - name: Extract outputs
        id: out
        run: |
          cd terraform/deploy
          echo "mgmt_public_ip=$(terraform output -raw mgmt_public_ip)" >> "$GITHUB_OUTPUT"
          echo "vip_public_ip=$(terraform output -raw vip_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "==========================================="
          echo "  VPX Deployed"
          echo "==========================================="
          echo "  Management: https://${{ steps.out.outputs.mgmt_public_ip }}"
          echo "  VIP:        https://${{ steps.out.outputs.vip_public_ip }}"
          echo "==========================================="

  # ============================================================
  # Job 2: Configure VPX (security + traffic)
  # ============================================================
  configure:
    name: "Configure VPX"
    if: ${{ !inputs.demoMode }}
    runs-on: [self-hosted, Linux]
    needs: deploy
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Resolve state storage
        run: |
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          echo "SA_NAME=stvpxstate${SUFFIX}" >> "$GITHUB_ENV"

      - name: Wait for VPX NITRO API
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          echo "Waiting for VPX NITRO API at ${MGMT_IP}..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -sk --connect-timeout 5 -w "%{http_code}" \
              "https://${MGMT_IP}/nitro/v1/config/nsversion" \
              -o /dev/null 2>/dev/null) || true
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "VPX NITRO API is ready (HTTP $HTTP_CODE)"
              break
            fi
            echo "Attempt $i/30 — HTTP $HTTP_CODE — waiting 10s..."
            sleep 10
          done

      # --- Security module ---
      - name: Terraform Init (security)
        run: |
          cd terraform/security
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=security.tfstate"

      - name: Terraform Apply (security)
        run: |
          cd terraform/security
          terraform apply -auto-approve -input=false \
            -var="nsip=${{ needs.deploy.outputs.mgmt_public_ip }}" \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}"

      # --- Read cert outputs from deploy state ---
      - name: Read cert outputs
        run: |
          cd terraform/deploy
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=deploy.tfstate" 2>/dev/null

          LAB_CA=$(terraform output -raw lab_ca_crt_b64)
          WILD_CRT=$(terraform output -raw wildcard_crt_b64)
          WILD_KEY=$(terraform output -raw wildcard_key_b64)

          echo "::add-mask::$LAB_CA"
          echo "::add-mask::$WILD_CRT"
          echo "::add-mask::$WILD_KEY"

          echo "LAB_CA=$LAB_CA" >> "$GITHUB_ENV"
          echo "WILD_CRT=$WILD_CRT" >> "$GITHUB_ENV"
          echo "WILD_KEY=$WILD_KEY" >> "$GITHUB_ENV"

      # --- Traffic module ---
      - name: Terraform Init (traffic)
        run: |
          cd terraform/traffic
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=traffic.tfstate"

      - name: Terraform Apply (traffic)
        run: |
          cd terraform/traffic
          terraform apply -auto-approve -input=false \
            -var="nsip=${{ needs.deploy.outputs.mgmt_public_ip }}" \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}" \
            -var="lab_ca_crt=${{ env.LAB_CA }}" \
            -var="wildcard_crt=${{ env.WILD_CRT }}" \
            -var="wildcard_key=${{ env.WILD_KEY }}"

      - name: Summary
        run: |
          echo "==========================================="
          echo "  VPX Configuration Complete"
          echo "==========================================="
          echo "  Management:  https://${{ needs.deploy.outputs.mgmt_public_ip }}"
          echo "  VIP HTTPS:   https://${{ needs.deploy.outputs.vip_public_ip }}/get"
          echo "  Backend:     httpbin.org"
          echo "==========================================="

  # ============================================================
  # Job 3: Run regression tests (output to logs)
  # ============================================================
  test:
    name: "Regression Tests"
    runs-on: [self-hosted, Linux]
    needs: [deploy, configure]
    if: always()
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Run tests (real mode)
        if: ${{ !inputs.demoMode && needs.configure.result == 'success' }}
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          VIP="${{ needs.deploy.outputs.vip_public_ip }}"
          NSROOT_PW="${{ secrets.NSROOT_PASSWORD }}"
          echo "::add-mask::$NSROOT_PW"

          echo "==========================================="
          echo "  Running NITRO API Tests"
          echo "  NSIP: ${MGMT_IP} (public)"
          echo "  VIP:  ${VIP} (public)"
          echo "==========================================="

          cd scripts
          chmod +x run-comprehensive-tests.sh
          ./run-comprehensive-tests.sh \
            "${MGMT_IP}" "${NSROOT_PW}" \
            "/tmp/test-results.json" \
            "10.254.11.10" "${VIP}" \
            "${VIP}" "${VIP}" || true

          echo ""
          echo "==========================================="
          echo "  Tests Complete — results above"
          echo "==========================================="

      - name: Run tests (demo mode)
        if: ${{ inputs.demoMode || needs.configure.result != 'success' }}
        run: |
          cd scripts
          echo "==========================================="
          echo "  Demo Mode — generating sample data"
          echo "==========================================="
          python3 generate-sample-data.py
          echo "Sample test data generated."

  # ============================================================
  # Job 4: Health check
  # ============================================================
  healthcheck:
    name: "Health Check"
    if: ${{ !inputs.demoMode }}
    runs-on: [self-hosted, Linux]
    needs: [deploy, configure]
    timeout-minutes: 5
    steps:
      - name: Check VIP HTTPS
        run: |
          VIP="${{ needs.deploy.outputs.vip_public_ip }}"
          echo "Testing VIP at https://${VIP}/get..."
          HTTP_CODE=$(curl -sk --connect-timeout 10 -w "%{http_code}" \
            -o /dev/null "https://${VIP}/get" 2>/dev/null) || true
          echo "VIP HTTPS: HTTP ${HTTP_CODE}"
          [ "$HTTP_CODE" = "200" ] && echo "PASS: VIP endpoint healthy" || echo "WARN: VIP returned HTTP ${HTTP_CODE}"

      - name: Check HTTP redirect
        run: |
          VIP="${{ needs.deploy.outputs.vip_public_ip }}"
          HTTP_CODE=$(curl -s --connect-timeout 10 -w "%{http_code}" \
            -o /dev/null "http://${VIP}/" 2>/dev/null) || true
          echo "HTTP redirect: HTTP ${HTTP_CODE}"
          [ "$HTTP_CODE" = "301" ] && echo "PASS: HTTP->HTTPS redirect working" || echo "WARN: Expected 301, got ${HTTP_CODE}"

      - name: Check security headers
        run: |
          VIP="${{ needs.deploy.outputs.vip_public_ip }}"
          echo "Checking security headers..."
          HEADERS=$(curl -sk -I "https://${VIP}/get" 2>/dev/null) || true
          PASS=0; FAIL=0
          for HEADER in "Strict-Transport-Security" "X-Frame-Options" "X-Content-Type-Options" "Content-Security-Policy" "Referrer-Policy"; do
            if echo "$HEADERS" | grep -qi "$HEADER"; then
              echo "  PASS: ${HEADER}"
              PASS=$((PASS+1))
            else
              echo "  FAIL: ${HEADER} missing"
              FAIL=$((FAIL+1))
            fi
          done
          echo ""
          echo "Security headers: ${PASS}/5 present"

      - name: Summary
        run: |
          echo ""
          echo "==========================================="
          echo "  Health Check Complete"
          echo "==========================================="
          echo "  VIP:     https://${{ needs.deploy.outputs.vip_public_ip }}/get"
          echo "  Backend: httpbin.org"
          echo "==========================================="
