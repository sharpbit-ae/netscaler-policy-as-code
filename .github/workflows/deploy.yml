name: Deploy & Test NetScaler VPX

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region"
        type: string
        default: "eastus"
      vmSize:
        description: "VM size (must support 2 NICs)"
        type: string
        default: "Standard_D2s_v3"

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  TF_LOCATION: ${{ inputs.location || 'eastus' }}
  TF_VM_SIZE: ${{ inputs.vmSize || 'Standard_D2s_v3' }}

jobs:
  # ============================================================
  # Stage 1: Deploy VPX VM + VNet + TLS certs
  # ============================================================
  deploy:
    name: "Stage 1 — Deploy VPX"
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    outputs:
      mgmt_public_ip: ${{ steps.out.outputs.mgmt_public_ip }}
      vip_public_ip: ${{ steps.out.outputs.vip_public_ip }}
      storage_account: ${{ steps.out.outputs.storage_account }}
      resource_group: ${{ steps.out.outputs.resource_group }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Create state storage
        run: |
          az group create -n rg-terraform-state -l $TF_LOCATION --output none 2>/dev/null || true
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          SA_NAME="stvpxstate${SUFFIX}"
          az storage account create -n "$SA_NAME" -g rg-terraform-state \
            -l $TF_LOCATION --sku Standard_LRS --output none 2>/dev/null || true
          az storage container create -n tfstate --account-name "$SA_NAME" \
            --output none 2>/dev/null || true
          echo "SA_NAME=$SA_NAME" >> "$GITHUB_ENV"

      - name: Accept marketplace terms
        run: az vm image terms accept --publisher citrix --offer netscalervpx-141 --plan netscalerbyol --output none

      - name: Terraform Init
        run: |
          cd terraform/deploy
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=deploy.tfstate"

      - name: Terraform Apply
        run: |
          cd terraform/deploy
          terraform apply -auto-approve -input=false \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}" \
            -var="rpc_password=${{ secrets.RPC_PASSWORD }}" \
            -var="location=$TF_LOCATION" \
            -var="vm_size=$TF_VM_SIZE"

      - name: Extract outputs
        id: out
        run: |
          cd terraform/deploy
          echo "mgmt_public_ip=$(terraform output -raw mgmt_public_ip)" >> "$GITHUB_OUTPUT"
          echo "vip_public_ip=$(terraform output -raw vip_public_ip)" >> "$GITHUB_OUTPUT"
          echo "storage_account=$(terraform output -raw storage_account_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "==========================================="
          echo "  Stage 1 — VPX Deployed"
          echo "==========================================="
          echo "  Management: https://${{ steps.out.outputs.mgmt_public_ip }}"
          echo "  VIP:        https://${{ steps.out.outputs.vip_public_ip }}"
          echo "==========================================="

  # ============================================================
  # Stage 2: Configure VPX (security hardening + traffic config)
  # ============================================================
  configure:
    name: "Stage 2 — Configure VPX"
    runs-on: [self-hosted, Linux]
    needs: deploy
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Resolve state storage
        run: |
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          echo "SA_NAME=stvpxstate${SUFFIX}" >> "$GITHUB_ENV"

      - name: Wait for VPX NITRO API
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          echo "Waiting for VPX NITRO API at ${MGMT_IP}..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -sk --connect-timeout 5 -w "%{http_code}" \
              "https://${MGMT_IP}/nitro/v1/config/nsversion" \
              -o /dev/null 2>/dev/null) || true
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "VPX NITRO API is ready (HTTP $HTTP_CODE)"
              break
            fi
            echo "Attempt $i/30 — HTTP $HTTP_CODE — waiting 10s..."
            sleep 10
          done

      - name: Terraform Init (security)
        run: |
          cd terraform/security
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=security.tfstate"

      - name: Terraform Apply (security)
        run: |
          cd terraform/security
          terraform apply -auto-approve -input=false \
            -var="nsip=${{ needs.deploy.outputs.mgmt_public_ip }}" \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}"

      - name: Read cert outputs from deploy state
        run: |
          cd terraform/deploy
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=deploy.tfstate" 2>/dev/null

          LAB_CA=$(terraform output -raw lab_ca_crt_b64)
          WILD_CRT=$(terraform output -raw wildcard_crt_b64)
          WILD_KEY=$(terraform output -raw wildcard_key_b64)

          echo "::add-mask::$LAB_CA"
          echo "::add-mask::$WILD_CRT"
          echo "::add-mask::$WILD_KEY"

          echo "LAB_CA=$LAB_CA" >> "$GITHUB_ENV"
          echo "WILD_CRT=$WILD_CRT" >> "$GITHUB_ENV"
          echo "WILD_KEY=$WILD_KEY" >> "$GITHUB_ENV"

      - name: Terraform Init (traffic)
        run: |
          cd terraform/traffic
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=traffic.tfstate"

      - name: Terraform Apply (traffic)
        run: |
          cd terraform/traffic
          terraform apply -auto-approve -input=false \
            -var="nsip=${{ needs.deploy.outputs.mgmt_public_ip }}" \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}" \
            -var="lab_ca_crt=${{ env.LAB_CA }}" \
            -var="wildcard_crt=${{ env.WILD_CRT }}" \
            -var="wildcard_key=${{ env.WILD_KEY }}"

      - name: Summary
        run: |
          echo "==========================================="
          echo "  Stage 2 — VPX Configuration Complete"
          echo "==========================================="
          echo "  Security hardening applied"
          echo "  Traffic config applied (httpbin.org backend)"
          echo "  VIP HTTPS: https://${{ needs.deploy.outputs.vip_public_ip }}/get"
          echo "==========================================="

  # ============================================================
  # Stage 3: Comprehensive test suite
  # ============================================================
  report:
    name: "Stage 3 — Test & Report"
    runs-on: [self-hosted, Linux]
    needs: [deploy, configure]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Resolve state storage
        run: |
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          echo "SA_NAME=stvpxstate${SUFFIX}" >> "$GITHUB_ENV"

      - name: Run comprehensive test suite
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          VIP="${{ needs.deploy.outputs.vip_public_ip }}"
          NSROOT_PW="${{ secrets.NSROOT_PASSWORD }}"
          echo "::add-mask::$NSROOT_PW"

          cd scripts
          chmod +x run-comprehensive-tests.sh
          ./run-comprehensive-tests.sh "${MGMT_IP}" "${NSROOT_PW}" "${VIP}"

      - name: Collect VPX logs and upload to Azure Storage
        if: always()
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          NSROOT_PW="${{ secrets.NSROOT_PASSWORD }}"
          SA_NAME="${{ needs.deploy.outputs.storage_account }}"
          RG_NAME="${{ needs.deploy.outputs.resource_group }}"
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)

          echo "==========================================="
          echo "  Collecting VPX logs..."
          echo "==========================================="

          mkdir -p /tmp/vpx-logs

          # Download newnslog via NITRO systemfile API
          FILES=$(curl -sk -u "nsroot:${NSROOT_PW}" \
            "https://${MGMT_IP}/nitro/v1/config/systemfile?args=filelocation:%2Fvar%2Fnslog" \
            2>/dev/null | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              for f in data.get('systemfile', []):
                  print(f['filename'])
          except: pass
          ") || true

          COUNT=0
          for FILE in $FILES; do
            # Download each log file
            CONTENT=$(curl -sk -u "nsroot:${NSROOT_PW}" \
              "https://${MGMT_IP}/nitro/v1/config/systemfile?args=filename:${FILE},filelocation:%2Fvar%2Fnslog" \
              2>/dev/null | python3 -c "
          import sys, json, base64
          try:
              data = json.load(sys.stdin)
              content = data['systemfile'][0]['filecontent']
              sys.stdout.buffer.write(base64.b64decode(content))
          except: pass
          ") || true

            if [ -n "$CONTENT" ]; then
              echo "$CONTENT" > "/tmp/vpx-logs/${FILE}"
              COUNT=$((COUNT + 1))
            fi
          done

          echo "  Downloaded $COUNT log files"

          # Also grab nslog via NITRO syslog (recent messages)
          curl -sk -u "nsroot:${NSROOT_PW}" \
            "https://${MGMT_IP}/nitro/v1/config/auditmessages?count=1000" \
            2>/dev/null > /tmp/vpx-logs/audit-messages.json || true

          # Upload to Azure Blob Storage
          if [ "$COUNT" -gt 0 ] || [ -s /tmp/vpx-logs/audit-messages.json ]; then
            for LOGFILE in /tmp/vpx-logs/*; do
              BASENAME=$(basename "$LOGFILE")
              az storage blob upload \
                --account-name "$SA_NAME" \
                --container-name "vpx-logs" \
                --name "${TIMESTAMP}/${BASENAME}" \
                --file "$LOGFILE" \
                --auth-mode login \
                --overwrite --output none 2>/dev/null || true
            done
            echo "  Uploaded logs to: ${SA_NAME}/vpx-logs/${TIMESTAMP}/"
          else
            echo "  No logs to upload"
          fi

          # Print HTTP transaction summary from audit messages
          echo ""
          echo "==========================================="
          echo "  HTTP Transaction Log Summary"
          echo "==========================================="
          python3 -c "
          import json
          try:
              with open('/tmp/vpx-logs/audit-messages.json') as f:
                  data = json.load(f)
              msgs = data.get('auditmessages', data.get('auditmessage', []))
              http_tx = [m for m in msgs if 'HTTP_TX' in str(m.get('message', m.get('val', '')))]
              print(f'  Total audit messages: {len(msgs)}')
              print(f'  HTTP transactions:    {len(http_tx)}')
              if http_tx:
                  print('')
                  print('  Last 10 transactions:')
                  for m in http_tx[-10:]:
                      msg = m.get('message', m.get('val', ''))
                      print(f'    {msg}')
          except Exception as e:
              print(f'  Could not parse audit messages: {e}')
          " 2>/dev/null || echo "  No audit messages available"

          rm -rf /tmp/vpx-logs
