#cloud-config
package_update: true
packages:
  - curl
  - jq
  - unzip
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release

runcmd:
  # Install Azure CLI
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash

  # Install Terraform
  - curl -fsSL https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip -o /tmp/terraform.zip
  - unzip /tmp/terraform.zip -d /usr/local/bin/
  - rm /tmp/terraform.zip

  # Install Docker (before runner so runner user gets docker group)
  - curl -fsSL https://get.docker.com | bash
  - systemctl enable docker
  - systemctl start docker

  # Install GitHub Actions Runner
  - mkdir -p /opt/actions-runner
  - cd /opt/actions-runner
  - curl -o actions-runner.tar.gz -L https://github.com/actions/runner/releases/download/v2.321.0/actions-runner-linux-x64-2.321.0.tar.gz
  - tar xzf actions-runner.tar.gz
  - rm actions-runner.tar.gz
  - ./bin/installdependencies.sh

  # Create runner user with docker group and configure
  - useradd -m -s /bin/bash -G docker runner
  - chown -R runner:runner /opt/actions-runner
  - |
    su runner -c "cd /opt/actions-runner && ./config.sh \
      --url https://github.com/${gh_owner}/${gh_repo} \
      --token ${gh_runner_token} \
      --name azure-vpx-runner \
      --labels self-hosted,Linux,azure-vpx \
      --unattended \
      --replace"

  # Install and start as a service
  - cd /opt/actions-runner && ./svc.sh install runner
  - cd /opt/actions-runner && ./svc.sh start
