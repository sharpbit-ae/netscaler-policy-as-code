name: Deploy & Test NetScaler VPX

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region"
        type: string
        default: "eastus"
      vmSize:
        description: "VM size (must support 2 NICs)"
        type: string
        default: "Standard_D2s_v3"

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  TF_LOCATION: ${{ inputs.location || 'eastus' }}
  TF_VM_SIZE: ${{ inputs.vmSize || 'Standard_D2s_v3' }}

jobs:
  # ============================================================
  # Stage 1: Deploy VPX VM + VNet + TLS certs
  # ============================================================
  deploy:
    name: "Stage 1 — Deploy VPX"
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    outputs:
      mgmt_public_ip: ${{ steps.out.outputs.mgmt_public_ip }}
      vip_public_ip: ${{ steps.out.outputs.vip_public_ip }}
      storage_account: ${{ steps.out.outputs.storage_account }}
      resource_group: ${{ steps.out.outputs.resource_group }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Create state storage
        run: |
          az group create -n rg-terraform-state -l $TF_LOCATION --output none 2>/dev/null || true
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          SA_NAME="stvpxstate${SUFFIX}"
          az storage account create -n "$SA_NAME" -g rg-terraform-state \
            -l $TF_LOCATION --sku Standard_LRS --output none 2>/dev/null || true
          az storage container create -n tfstate --account-name "$SA_NAME" \
            --output none 2>/dev/null || true
          echo "SA_NAME=$SA_NAME" >> "$GITHUB_ENV"

      - name: Accept marketplace terms
        run: az vm image terms accept --publisher citrix --offer netscalervpx-141 --plan netscalerbyol --output none

      - name: Terraform Init
        run: |
          cd terraform/deploy
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=deploy.tfstate"

      - name: Terraform Apply
        run: |
          cd terraform/deploy
          terraform apply -auto-approve -input=false \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}" \
            -var="rpc_password=${{ secrets.RPC_PASSWORD }}" \
            -var="location=$TF_LOCATION" \
            -var="vm_size=$TF_VM_SIZE"

      - name: Extract outputs
        id: out
        run: |
          cd terraform/deploy
          echo "mgmt_public_ip=$(terraform output -raw mgmt_public_ip)" >> "$GITHUB_OUTPUT"
          echo "vip_public_ip=$(terraform output -raw vip_public_ip)" >> "$GITHUB_OUTPUT"
          echo "storage_account=$(terraform output -raw storage_account_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "==========================================="
          echo "  Stage 1 — VPX Deployed"
          echo "==========================================="
          echo "  Management: https://${{ steps.out.outputs.mgmt_public_ip }}"
          echo "  VIP:        https://${{ steps.out.outputs.vip_public_ip }}"
          echo "==========================================="

  # ============================================================
  # Stage 2: Configure VPX (security hardening + traffic config)
  # ============================================================
  configure:
    name: "Stage 2 — Configure VPX"
    runs-on: [self-hosted, Linux]
    needs: deploy
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Resolve state storage
        run: |
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          echo "SA_NAME=stvpxstate${SUFFIX}" >> "$GITHUB_ENV"

      - name: Wait for VPX NITRO API
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          echo "Waiting for VPX NITRO API at ${MGMT_IP}..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -sk --connect-timeout 5 -w "%{http_code}" \
              "https://${MGMT_IP}/nitro/v1/config/nsversion" \
              -o /dev/null 2>/dev/null) || true
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "VPX NITRO API is ready (HTTP $HTTP_CODE)"
              break
            fi
            echo "Attempt $i/30 — HTTP $HTTP_CODE — waiting 10s..."
            sleep 10
          done

      - name: Terraform Init (security)
        run: |
          cd terraform/security
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=security.tfstate"

      - name: Terraform Apply (security)
        run: |
          cd terraform/security
          terraform apply -auto-approve -input=false \
            -var="nsip=${{ needs.deploy.outputs.mgmt_public_ip }}" \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}"

      - name: Read cert outputs from deploy state
        run: |
          cd terraform/deploy
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=deploy.tfstate" 2>/dev/null

          LAB_CA=$(terraform output -raw lab_ca_crt_b64)
          WILD_CRT=$(terraform output -raw wildcard_crt_b64)
          WILD_KEY=$(terraform output -raw wildcard_key_b64)

          echo "::add-mask::$LAB_CA"
          echo "::add-mask::$WILD_CRT"
          echo "::add-mask::$WILD_KEY"

          echo "LAB_CA=$LAB_CA" >> "$GITHUB_ENV"
          echo "WILD_CRT=$WILD_CRT" >> "$GITHUB_ENV"
          echo "WILD_KEY=$WILD_KEY" >> "$GITHUB_ENV"

      - name: Terraform Init (traffic)
        run: |
          cd terraform/traffic
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=traffic.tfstate"

      - name: Terraform Apply (traffic)
        run: |
          cd terraform/traffic
          terraform apply -auto-approve -input=false \
            -var="nsip=${{ needs.deploy.outputs.mgmt_public_ip }}" \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}" \
            -var="lab_ca_crt=${{ env.LAB_CA }}" \
            -var="wildcard_crt=${{ env.WILD_CRT }}" \
            -var="wildcard_key=${{ env.WILD_KEY }}"

      - name: Summary
        run: |
          echo "==========================================="
          echo "  Stage 2 — VPX Configuration Complete"
          echo "==========================================="
          echo "  Security hardening applied"
          echo "  Traffic config applied (httpbin.org backend)"
          echo "  VIP HTTPS: https://${{ needs.deploy.outputs.vip_public_ip }}/get"
          echo "==========================================="

  # ============================================================
  # Stage 3: Comprehensive test suite
  # ============================================================
  report:
    name: "Stage 3 — Test & Report"
    runs-on: [self-hosted, Linux]
    needs: [deploy, configure]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Resolve state storage
        run: |
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          echo "SA_NAME=stvpxstate${SUFFIX}" >> "$GITHUB_ENV"

      - name: Run comprehensive test suite
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          VIP="${{ needs.deploy.outputs.vip_public_ip }}"
          NSROOT_PW="${{ secrets.NSROOT_PASSWORD }}"
          echo "::add-mask::$NSROOT_PW"

          mkdir -p /tmp/vpx-logs

          cd scripts
          chmod +x run-comprehensive-tests.sh
          set -o pipefail
          ./run-comprehensive-tests.sh "${MGMT_IP}" "${NSROOT_PW}" "${VIP}" 2>&1 | tee /tmp/vpx-logs/test-results.log

      - name: Collect VPX data and upload to Azure Storage
        if: always()
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          NSROOT_PW="${{ secrets.NSROOT_PASSWORD }}"
          SA_NAME="${{ needs.deploy.outputs.storage_account }}"
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          RUN_ID="${{ github.run_id }}"
          echo "::add-mask::$NSROOT_PW"

          echo "==========================================="
          echo "  Collecting VPX data..."
          echo "==========================================="

          mkdir -p /tmp/vpx-logs

          # Collect NITRO stats using X-NITRO headers (same auth as test script)
          NITRO_HEADERS="-H 'Content-Type: application/json' -H 'X-NITRO-USER: nsroot' -H 'X-NITRO-PASS: ${NSROOT_PW}'"

          echo "  Collecting NITRO stats..."
          for ENDPOINT in ns lbvserver servicegroup; do
            curl -sk -H "Content-Type: application/json" \
              -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
              "https://${MGMT_IP}/nitro/v1/stat/${ENDPOINT}" \
              -o "/tmp/vpx-logs/stat-${ENDPOINT}.json" 2>/dev/null || true
          done

          echo "  Collecting NITRO config..."
          for ENDPOINT in lbvserver servicegroup server sslvserver rewritepolicy responderpolicy auditmessageaction nsfeature nsmode; do
            curl -sk -H "Content-Type: application/json" \
              -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
              "https://${MGMT_IP}/nitro/v1/config/${ENDPOINT}" \
              -o "/tmp/vpx-logs/config-${ENDPOINT}.json" 2>/dev/null || true
          done

          # Try to get ns.log via systemfile
          HTTP_CODE=$(curl -sk -H "Content-Type: application/json" \
            -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
            -w "%{http_code}" \
            "https://${MGMT_IP}/nitro/v1/config/systemfile?args=filename:ns.log,filelocation:%2Fvar%2Flog" \
            -o /tmp/vpx-logs/systemfile-response.json 2>/dev/null) || true
          echo "  systemfile API: HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            python3 -c "
          import json, base64
          with open('/tmp/vpx-logs/systemfile-response.json') as f:
              data = json.load(f)
          if 'systemfile' in data:
              content = data['systemfile'][0]['filecontent']
              with open('/tmp/vpx-logs/ns.log', 'wb') as out:
                  out.write(base64.b64decode(content))
              print('  ns.log downloaded successfully')
          else:
              print(f'  systemfile: {data.get(\"message\", \"not available\")}')
          " 2>/dev/null || echo "  Could not parse systemfile response"
          fi
          rm -f /tmp/vpx-logs/systemfile-response.json

          # Count collected files
          COUNT=$(find /tmp/vpx-logs -type f -size +0c | wc -l)
          echo "  Total: $COUNT files collected"

          # Upload to Azure Blob Storage
          if [ "$COUNT" -gt 0 ]; then
            for FILEPATH in /tmp/vpx-logs/*; do
              [ -s "$FILEPATH" ] || continue
              BASENAME=$(basename "$FILEPATH")
              az storage blob upload \
                --account-name "$SA_NAME" \
                --container-name "vpx-logs" \
                --name "run-${RUN_ID}/${TIMESTAMP}/${BASENAME}" \
                --file "$FILEPATH" \
                --auth-mode login \
                --overwrite --output none 2>/dev/null || true
            done
            echo "  Uploaded to: ${SA_NAME}/vpx-logs/run-${RUN_ID}/${TIMESTAMP}/"
          else
            echo "  No data to upload"
          fi

          # Print VPX stats summary
          echo ""
          echo "==========================================="
          echo "  VPX Connection Log Summary"
          echo "==========================================="
          python3 -c "
          import json, os, glob

          # System stats
          try:
              with open('/tmp/vpx-logs/stat-nssystem.json') as f:
                  s = json.load(f).get('system', {})
              print(f'  CPU:              {s.get(\"cpuusagepcnt\", \"?\")}%')
              print(f'  Memory:           {s.get(\"memusagepcnt\", \"?\")}% used')
              print(f'  HTTP requests:    {s.get(\"httptotrequests\", \"?\")}')
              print(f'  HTTP responses:   {s.get(\"httptotresponses\", \"?\")}')
              print(f'  SSL transactions: {s.get(\"ssltottransactions\", \"?\")}')
              print(f'  TCP connections:  {s.get(\"tcpcurclientconn\", \"?\")} client, {s.get(\"tcpcurserverconn\", \"?\")} server')
          except Exception as e:
              print(f'  System stats unavailable: {e}')

          # LB vserver stats
          print()
          try:
              with open('/tmp/vpx-logs/stat-lbvserver.json') as f:
                  vservers = json.load(f).get('lbvserver', [])
              for vs in vservers:
                  name = vs.get('name', '?')
                  state = vs.get('state', '?')
                  hits = vs.get('tothits', '0')
                  reqs = vs.get('totalrequests', '0')
                  print(f'  {name}: state={state}, hits={hits}, requests={reqs}')
          except Exception as e:
              print(f'  LB stats unavailable: {e}')

          # HTTP TX from ns.log if available
          if os.path.exists('/tmp/vpx-logs/ns.log'):
              print()
              http_tx = []
              with open('/tmp/vpx-logs/ns.log') as f:
                  for line in f:
                      if 'HTTP_TX' in line:
                          http_tx.append(line.strip())
              print(f'  HTTP transactions logged: {len(http_tx)}')
              if http_tx:
                  print('  Last 5:')
                  for line in http_tx[-5:]:
                      parts = line.split('HTTP_TX', 1)
                      print(f'    HTTP_TX{parts[1]}' if len(parts) > 1 else f'    {line}')
          " 2>/dev/null || echo "  Could not generate summary"

          rm -rf /tmp/vpx-logs
