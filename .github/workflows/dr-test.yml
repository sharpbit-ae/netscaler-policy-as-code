name: Disaster Recovery Test

on:
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region"
        type: string
        default: "eastus"
      vmSize:
        description: "VM size (must support 2 NICs)"
        type: string
        default: "Standard_D2s_v5"

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  TF_LOCATION: ${{ inputs.location || 'eastus' }}
  TF_VM_SIZE: ${{ inputs.vmSize || 'Standard_D2s_v5' }}

jobs:
  # ============================================================
  # Stage 1: Deploy VPX VM + VNet + TLS certs
  # ============================================================
  deploy:
    name: "Stage 1 — Deploy VPX"
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    outputs:
      mgmt_public_ip: ${{ steps.out.outputs.mgmt_public_ip }}
      vip_public_ip: ${{ steps.out.outputs.vip_public_ip }}
      storage_account: ${{ steps.out.outputs.storage_account }}
      resource_group: ${{ steps.out.outputs.resource_group }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Create state storage
        run: |
          az group create -n rg-terraform-state -l $TF_LOCATION --output none 2>/dev/null || true
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          SA_NAME="stvpxstate${SUFFIX}"
          az storage account create -n "$SA_NAME" -g rg-terraform-state \
            -l $TF_LOCATION --sku Standard_LRS --output none 2>/dev/null || true
          az storage container create -n tfstate --account-name "$SA_NAME" \
            --output none 2>/dev/null || true
          echo "SA_NAME=$SA_NAME" >> "$GITHUB_ENV"

      - name: Accept marketplace terms
        run: az vm image terms accept --publisher citrix --offer netscalervpx-141 --plan netscalerbyol --output none

      - name: Terraform Init
        run: |
          cd terraform/deploy
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=deploy.tfstate"

      - name: Terraform Apply
        run: |
          cd terraform/deploy
          terraform apply -auto-approve -input=false \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}" \
            -var="rpc_password=${{ secrets.RPC_PASSWORD }}" \
            -var="location=$TF_LOCATION" \
            -var="vm_size=$TF_VM_SIZE" \
            -var="pipeline_run_id=${{ github.run_id }}"

      - name: Extract outputs
        id: out
        run: |
          cd terraform/deploy
          echo "mgmt_public_ip=$(terraform output -raw mgmt_public_ip)" >> "$GITHUB_OUTPUT"
          echo "vip_public_ip=$(terraform output -raw vip_public_ip)" >> "$GITHUB_OUTPUT"
          echo "storage_account=$(terraform output -raw storage_account_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

  # ============================================================
  # Stage 2: Configure VPX (security hardening + traffic config)
  # ============================================================
  configure:
    name: "Stage 2 — Configure VPX"
    runs-on: [self-hosted, Linux]
    needs: deploy
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Resolve state storage
        run: |
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          echo "SA_NAME=stvpxstate${SUFFIX}" >> "$GITHUB_ENV"

      - name: Wait for VPX NITRO API
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          echo "Waiting for VPX NITRO API at ${MGMT_IP}..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -sk --connect-timeout 5 -w "%{http_code}" \
              "https://${MGMT_IP}/nitro/v1/config/nsversion" \
              -o /dev/null 2>/dev/null) || true
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "VPX NITRO API is ready (HTTP $HTTP_CODE)"
              break
            fi
            echo "Attempt $i/30 — HTTP $HTTP_CODE — waiting 10s..."
            sleep 10
          done

      - name: Terraform Init (security)
        run: |
          cd terraform/security
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=security.tfstate"

      - name: Terraform Apply (security)
        run: |
          cd terraform/security
          terraform apply -auto-approve -input=false \
            -var="nsip=${{ needs.deploy.outputs.mgmt_public_ip }}" \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}"

      - name: Read cert outputs from deploy state
        run: |
          cd terraform/deploy
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=deploy.tfstate" 2>/dev/null

          LAB_CA=$(terraform output -raw lab_ca_crt_b64)
          WILD_CRT=$(terraform output -raw wildcard_crt_b64)
          WILD_KEY=$(terraform output -raw wildcard_key_b64)

          echo "::add-mask::$LAB_CA"
          echo "::add-mask::$WILD_CRT"
          echo "::add-mask::$WILD_KEY"

          echo "LAB_CA=$LAB_CA" >> "$GITHUB_ENV"
          echo "WILD_CRT=$WILD_CRT" >> "$GITHUB_ENV"
          echo "WILD_KEY=$WILD_KEY" >> "$GITHUB_ENV"

      - name: Terraform Init (traffic)
        run: |
          cd terraform/traffic
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=traffic.tfstate"

      - name: Terraform Apply (traffic)
        run: |
          cd terraform/traffic
          terraform apply -auto-approve -input=false \
            -var="nsip=${{ needs.deploy.outputs.mgmt_public_ip }}" \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}" \
            -var="lab_ca_crt=${{ env.LAB_CA }}" \
            -var="wildcard_crt=${{ env.WILD_CRT }}" \
            -var="wildcard_key=${{ env.WILD_KEY }}"

  # ============================================================
  # Stage 3: Baseline tests
  # ============================================================
  baseline:
    name: "Stage 3 — Baseline Tests"
    runs-on: [self-hosted, Linux]
    needs: [deploy, configure]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Run baseline test suite
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          VIP="${{ needs.deploy.outputs.vip_public_ip }}"
          NSROOT_PW="${{ secrets.NSROOT_PASSWORD }}"
          echo "::add-mask::$NSROOT_PW"

          mkdir -p /tmp/dr-test

          cd scripts
          chmod +x run-comprehensive-tests.sh
          set -o pipefail
          ./run-comprehensive-tests.sh "${MGMT_IP}" "${NSROOT_PW}" "${VIP}" 2>&1 | tee /tmp/dr-test/baseline.log

          echo ""
          echo "==========================================="
          echo "  Stage 3 — Baseline Tests Complete"
          echo "==========================================="

      - name: Upload baseline results
        uses: actions/upload-artifact@v4
        with:
          name: baseline-results
          path: /tmp/dr-test/baseline.log
          retention-days: 1

  # ============================================================
  # Stage 4: DR — Destroy + Recover + Retest
  # ============================================================
  dr-test:
    name: "Stage 4 — Disaster Recovery"
    runs-on: [self-hosted, Linux]
    needs: [deploy, configure, baseline]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID" --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Resolve state storage
        run: |
          SUFFIX=$(echo "$ARM_SUBSCRIPTION_ID" | md5sum | head -c8)
          echo "SA_NAME=stvpxstate${SUFFIX}" >> "$GITHUB_ENV"

      - name: Download baseline results
        uses: actions/download-artifact@v4
        with:
          name: baseline-results
          path: /tmp/dr-test

      - name: "Start data plane saturation probe"
        run: |
          VIP="${{ needs.deploy.outputs.vip_public_ip }}"
          mkdir -p /tmp/dr-test

          chmod +x scripts/dr-saturation.sh
          nohup scripts/dr-saturation.sh "$VIP" /tmp/dr-test/saturation.csv 2 \
              > /tmp/dr-test/saturation-stderr.log 2>&1 &
          PROBE_PID=$!
          echo "$PROBE_PID" > /tmp/dr-test/saturation.pid
          echo "  Saturation probe started (PID: $PROBE_PID)"

          # Wait briefly to confirm probe is generating data
          sleep 6
          LINES=$(wc -l < /tmp/dr-test/saturation.csv)
          echo "  Probe generating data: $LINES lines after 6s"

      - name: "DR Phase 1 — Destroy VPX VM"
        run: |
          RG="${{ needs.deploy.outputs.resource_group }}"
          echo "==========================================="
          echo "  DR Phase 1 — Destroying VPX VM"
          echo "==========================================="
          echo ""

          # Record destruction start time
          date -u +%s > /tmp/dr-test/t0_destroy_start

          # Delete the VM (forces NIC detachment, deletes OS disk)
          echo "  Deleting VM: vm-vpx in $RG..."
          az vm delete --name vm-vpx --resource-group "$RG" --yes --force-deletion true --output none

          # Also delete the NICs (Azure doesn't auto-delete them)
          echo "  Deleting NIC: nic-vpx-mgmt..."
          az network nic delete --name nic-vpx-mgmt --resource-group "$RG" --output none 2>/dev/null || true
          echo "  Deleting NIC: nic-vpx-client..."
          az network nic delete --name nic-vpx-client --resource-group "$RG" --output none 2>/dev/null || true

          # Delete OS disk
          echo "  Deleting OS disk: osdisk-vpx..."
          az disk delete --name osdisk-vpx --resource-group "$RG" --yes --output none 2>/dev/null || true

          date -u +%s > /tmp/dr-test/t1_destroy_end

          DURATION=$(( $(cat /tmp/dr-test/t1_destroy_end) - $(cat /tmp/dr-test/t0_destroy_start) ))
          echo ""
          echo "  VM destroyed in ${DURATION}s"

          # Verify VM is gone
          VM_EXISTS=$(az vm show --name vm-vpx --resource-group "$RG" --output tsv --query "name" 2>/dev/null || echo "GONE")
          if [ "$VM_EXISTS" = "GONE" ]; then
            echo "  Confirmed: VM no longer exists"
          else
            echo "  WARNING: VM still shows as existing"
          fi

      - name: "DR Phase 1b — Validate surviving infrastructure"
        run: |
          RG="${{ needs.deploy.outputs.resource_group }}"
          MGMT_PIP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          VIP_PIP="${{ needs.deploy.outputs.vip_public_ip }}"
          INFRA_PASS=0
          INFRA_FAIL=0

          echo "==========================================="
          echo "  DR Phase 1b — Infrastructure Survival Check"
          echo "==========================================="
          echo ""
          echo "  VM is destroyed. Verifying network infrastructure survived..."
          echo ""

          infra_check() {
            local name="$1" cmd="$2" expected="$3"
            RESULT=$(eval "$cmd" 2>/dev/null) || RESULT=""
            if [ -n "$RESULT" ]; then
              if [ -n "$expected" ]; then
                if [ "$RESULT" = "$expected" ]; then
                  printf "  PASS  %-45s %s\n" "$name" "$RESULT"
                  INFRA_PASS=$((INFRA_PASS+1))
                else
                  printf "  FAIL  %-45s expected: %s, got: %s\n" "$name" "$expected" "$RESULT"
                  INFRA_FAIL=$((INFRA_FAIL+1))
                fi
              else
                printf "  PASS  %-45s %s\n" "$name" "$RESULT"
                INFRA_PASS=$((INFRA_PASS+1))
              fi
            else
              printf "  FAIL  %-45s NOT FOUND\n" "$name"
              INFRA_FAIL=$((INFRA_FAIL+1))
            fi
          }

          echo "  --- VNet & Subnets ---"
          infra_check "VNet exists (vnet-vpx)" \
            "az network vnet show -n vnet-vpx -g $RG --query 'name' -o tsv" \
            "vnet-vpx"
          infra_check "VNet address space" \
            "az network vnet show -n vnet-vpx -g $RG --query 'addressSpace.addressPrefixes[0]' -o tsv" \
            "10.254.0.0/16"
          infra_check "Management subnet (snet-vpx-mgmt)" \
            "az network vnet subnet show -n snet-vpx-mgmt --vnet-name vnet-vpx -g $RG --query 'addressPrefix' -o tsv" \
            "10.254.10.0/24"
          infra_check "Client subnet (snet-vpx-client)" \
            "az network vnet subnet show -n snet-vpx-client --vnet-name vnet-vpx -g $RG --query 'addressPrefix' -o tsv" \
            "10.254.11.0/24"

          echo ""
          echo "  --- Network Security Groups ---"
          infra_check "Management NSG exists" \
            "az network nsg show -n nsg-management -g $RG --query 'name' -o tsv" \
            "nsg-management"
          infra_check "Client NSG exists" \
            "az network nsg show -n nsg-client -g $RG --query 'name' -o tsv" \
            "nsg-client"

          # Verify NSG rules
          MGMT_PORTS=$(az network nsg rule show -n allow-ssh-http-https --nsg-name nsg-management -g $RG \
            --query 'destinationPortRanges' -o tsv 2>/dev/null | tr '\t' ',' || echo "")
          if echo "$MGMT_PORTS" | grep -q "22" && echo "$MGMT_PORTS" | grep -q "443"; then
            printf "  PASS  %-45s ports: %s\n" "Mgmt NSG rule (SSH+HTTP+HTTPS)" "$MGMT_PORTS"
            INFRA_PASS=$((INFRA_PASS+1))
          else
            printf "  FAIL  %-45s expected 22,80,443 got: %s\n" "Mgmt NSG rule" "$MGMT_PORTS"
            INFRA_FAIL=$((INFRA_FAIL+1))
          fi

          CLIENT_PORTS=$(az network nsg rule show -n allow-http-https --nsg-name nsg-client -g $RG \
            --query 'destinationPortRanges' -o tsv 2>/dev/null | tr '\t' ',' || echo "")
          if echo "$CLIENT_PORTS" | grep -q "80" && echo "$CLIENT_PORTS" | grep -q "443"; then
            printf "  PASS  %-45s ports: %s\n" "Client NSG rule (HTTP+HTTPS)" "$CLIENT_PORTS"
            INFRA_PASS=$((INFRA_PASS+1))
          else
            printf "  FAIL  %-45s expected 80,443 got: %s\n" "Client NSG rule" "$CLIENT_PORTS"
            INFRA_FAIL=$((INFRA_FAIL+1))
          fi

          # Verify NSG-to-subnet associations survived
          MGMT_NSG_ID=$(az network vnet subnet show -n snet-vpx-mgmt --vnet-name vnet-vpx -g $RG \
            --query 'networkSecurityGroup.id' -o tsv 2>/dev/null || echo "")
          if echo "$MGMT_NSG_ID" | grep -qi "nsg-management"; then
            printf "  PASS  %-45s associated\n" "Mgmt subnet → NSG association"
            INFRA_PASS=$((INFRA_PASS+1))
          else
            printf "  FAIL  %-45s not associated\n" "Mgmt subnet → NSG association"
            INFRA_FAIL=$((INFRA_FAIL+1))
          fi

          CLIENT_NSG_ID=$(az network vnet subnet show -n snet-vpx-client --vnet-name vnet-vpx -g $RG \
            --query 'networkSecurityGroup.id' -o tsv 2>/dev/null || echo "")
          if echo "$CLIENT_NSG_ID" | grep -qi "nsg-client"; then
            printf "  PASS  %-45s associated\n" "Client subnet → NSG association"
            INFRA_PASS=$((INFRA_PASS+1))
          else
            printf "  FAIL  %-45s not associated\n" "Client subnet → NSG association"
            INFRA_FAIL=$((INFRA_FAIL+1))
          fi

          echo ""
          echo "  --- Public IPs ---"
          infra_check "Management public IP allocated" \
            "az network public-ip show -n pip-vpx-mgmt -g $RG --query 'ipAddress' -o tsv" \
            "$MGMT_PIP"
          infra_check "VIP public IP allocated" \
            "az network public-ip show -n pip-vpx-vip -g $RG --query 'ipAddress' -o tsv" \
            "$VIP_PIP"
          infra_check "Management PIP SKU" \
            "az network public-ip show -n pip-vpx-mgmt -g $RG --query 'sku.name' -o tsv" \
            "Standard"
          infra_check "VIP PIP SKU" \
            "az network public-ip show -n pip-vpx-vip -g $RG --query 'sku.name' -o tsv" \
            "Standard"

          echo ""
          echo "  --- Storage ---"
          SA="${{ needs.deploy.outputs.storage_account }}"
          infra_check "Storage account exists" \
            "az storage account show -n $SA -g $RG --query 'name' -o tsv" \
            "$SA"

          echo ""
          echo "  --- Resource Tags ---"
          for RES_TYPE_NAME in \
              "network vnet:vnet-vpx" \
              "network nsg:nsg-management" \
              "network nsg:nsg-client" \
              "network public-ip:pip-vpx-mgmt" \
              "network public-ip:pip-vpx-vip" \
              "storage account:$SA"; do
            RES_TYPE=$(echo "$RES_TYPE_NAME" | cut -d: -f1)
            RES_NAME=$(echo "$RES_TYPE_NAME" | cut -d: -f2)
            TAG_PROJECT=$(az $RES_TYPE show -n "$RES_NAME" -g $RG --query 'tags.project' -o tsv 2>/dev/null || echo "")
            TAG_MANAGED=$(az $RES_TYPE show -n "$RES_NAME" -g $RG --query 'tags.managed_by' -o tsv 2>/dev/null || echo "")
            if [ "$TAG_PROJECT" = "netscaler-vpx" ] && [ "$TAG_MANAGED" = "terraform" ]; then
              printf "  PASS  %-45s project=%s, managed_by=%s\n" "Tags: $RES_NAME" "$TAG_PROJECT" "$TAG_MANAGED"
              INFRA_PASS=$((INFRA_PASS+1))
            else
              printf "  FAIL  %-45s project=%s, managed_by=%s\n" "Tags: $RES_NAME" "${TAG_PROJECT:-missing}" "${TAG_MANAGED:-missing}"
              INFRA_FAIL=$((INFRA_FAIL+1))
            fi
          done

          # Verify effective routes on subnet (default Azure routes)
          echo ""
          echo "  --- Route Tables ---"
          MGMT_ROUTES=$(az network vnet subnet show -n snet-vpx-mgmt --vnet-name vnet-vpx -g $RG \
            --query 'routeTable.id' -o tsv 2>/dev/null || echo "NONE")
          if [ "$MGMT_ROUTES" = "NONE" ] || [ -z "$MGMT_ROUTES" ]; then
            printf "  PASS  %-45s using Azure default routes\n" "Mgmt subnet routing"
            INFRA_PASS=$((INFRA_PASS+1))
          else
            printf "  PASS  %-45s custom: %s\n" "Mgmt subnet routing" "$(basename $MGMT_ROUTES)"
            INFRA_PASS=$((INFRA_PASS+1))
          fi

          CLIENT_ROUTES=$(az network vnet subnet show -n snet-vpx-client --vnet-name vnet-vpx -g $RG \
            --query 'routeTable.id' -o tsv 2>/dev/null || echo "NONE")
          if [ "$CLIENT_ROUTES" = "NONE" ] || [ -z "$CLIENT_ROUTES" ]; then
            printf "  PASS  %-45s using Azure default routes\n" "Client subnet routing"
            INFRA_PASS=$((INFRA_PASS+1))
          else
            printf "  PASS  %-45s custom: %s\n" "Client subnet routing" "$(basename $CLIENT_ROUTES)"
            INFRA_PASS=$((INFRA_PASS+1))
          fi

          echo ""
          echo "  --- VM Confirmed Absent ---"
          VM_CHECK=$(az vm show --name vm-vpx -g $RG --query 'name' -o tsv 2>/dev/null || echo "ABSENT")
          infra_check "VM is destroyed" \
            "echo $VM_CHECK" \
            "ABSENT"
          NIC_MGMT=$(az network nic show -n nic-vpx-mgmt -g $RG --query 'name' -o tsv 2>/dev/null || echo "ABSENT")
          infra_check "Management NIC is destroyed" \
            "echo $NIC_MGMT" \
            "ABSENT"
          NIC_CLIENT=$(az network nic show -n nic-vpx-client -g $RG --query 'name' -o tsv 2>/dev/null || echo "ABSENT")
          infra_check "Client NIC is destroyed" \
            "echo $NIC_CLIENT" \
            "ABSENT"

          echo ""
          echo "  ==========================================="
          printf "  Infrastructure: %d passed, %d failed\n" "$INFRA_PASS" "$INFRA_FAIL"
          if [ "$INFRA_FAIL" -gt 0 ]; then
            echo "  WARNING: Infrastructure damage detected — recovery may fail"
          else
            echo "  Network infrastructure intact — ready to rebuild"
          fi
          echo "  ==========================================="

          # Save results
          echo "{\"passed\":$INFRA_PASS,\"failed\":$INFRA_FAIL}" > /tmp/dr-test/infra-check.json

      - name: "DR Phase 2 — Recover VM (terraform apply)"
        run: |
          echo "==========================================="
          echo "  DR Phase 2 — Recovering VPX VM"
          echo "==========================================="
          echo ""

          date -u +%s > /tmp/dr-test/t2_recover_start

          cd terraform/deploy
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=deploy.tfstate"

          echo "  Running terraform apply to recreate VM..."
          terraform apply -auto-approve -input=false \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}" \
            -var="rpc_password=${{ secrets.RPC_PASSWORD }}" \
            -var="location=$TF_LOCATION" \
            -var="vm_size=$TF_VM_SIZE" \
            -var="pipeline_run_id=${{ github.run_id }}"

          date -u +%s > /tmp/dr-test/t3_vm_created

          DURATION=$(( $(cat /tmp/dr-test/t3_vm_created) - $(cat /tmp/dr-test/t2_recover_start) ))
          echo ""
          echo "  VM recreated in ${DURATION}s"

      - name: "DR Phase 3 — Wait for NITRO API"
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          echo "  Waiting for NITRO API at ${MGMT_IP}..."

          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -sk --connect-timeout 5 -w "%{http_code}" \
              "https://${MGMT_IP}/nitro/v1/config/nsversion" \
              -o /dev/null 2>/dev/null) || true
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "  NITRO API ready (HTTP $HTTP_CODE) after $i attempts"
              break
            fi
            echo "  Attempt $i/30 — HTTP $HTTP_CODE — waiting 10s..."
            sleep 10
          done

          date -u +%s > /tmp/dr-test/t4_api_ready

          DURATION=$(( $(cat /tmp/dr-test/t4_api_ready) - $(cat /tmp/dr-test/t3_vm_created) ))
          echo "  NITRO API ready ${DURATION}s after VM creation"

      - name: "DR Phase 4 — Reconfigure VPX"
        run: |
          echo "==========================================="
          echo "  DR Phase 4 — Reconfiguring VPX"
          echo "==========================================="

          date -u +%s > /tmp/dr-test/t5_config_start

          # Security hardening
          cd ${{ github.workspace }}/terraform/security
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=security.tfstate"

          terraform apply -auto-approve -input=false \
            -var="nsip=${{ needs.deploy.outputs.mgmt_public_ip }}" \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}"

          # Read cert outputs
          cd ${{ github.workspace }}/terraform/deploy
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=deploy.tfstate" 2>/dev/null

          LAB_CA=$(terraform output -raw lab_ca_crt_b64)
          WILD_CRT=$(terraform output -raw wildcard_crt_b64)
          WILD_KEY=$(terraform output -raw wildcard_key_b64)

          # Traffic config
          cd ${{ github.workspace }}/terraform/traffic
          terraform init -input=false \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$SA_NAME" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=traffic.tfstate"

          terraform apply -auto-approve -input=false \
            -var="nsip=${{ needs.deploy.outputs.mgmt_public_ip }}" \
            -var="nsroot_password=${{ secrets.NSROOT_PASSWORD }}" \
            -var="lab_ca_crt=${LAB_CA}" \
            -var="wildcard_crt=${WILD_CRT}" \
            -var="wildcard_key=${WILD_KEY}"

          date -u +%s > /tmp/dr-test/t6_config_end

          DURATION=$(( $(cat /tmp/dr-test/t6_config_end) - $(cat /tmp/dr-test/t5_config_start) ))
          echo ""
          echo "  Configuration applied in ${DURATION}s"

      - name: "DR Phase 4b — Validate VPX outbound connectivity"
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          VIP="${{ needs.deploy.outputs.vip_public_ip }}"
          RG="${{ needs.deploy.outputs.resource_group }}"
          NSROOT_PW="${{ secrets.NSROOT_PASSWORD }}"
          echo "::add-mask::$NSROOT_PW"

          CONN_PASS=0
          CONN_FAIL=0

          echo "==========================================="
          echo "  DR Phase 4b — VPX Outbound Connectivity"
          echo "==========================================="
          echo ""
          echo "  Verifying recovered NIC IPs and VPX connectivity..."
          echo ""

          conn_check() {
            local name="$1" result="$2" expected="$3"
            if [ "$result" = "$expected" ]; then
              printf "  PASS  %-45s %s\n" "$name" "$result"
              CONN_PASS=$((CONN_PASS+1))
            else
              printf "  FAIL  %-45s expected: %s, got: %s\n" "$name" "$expected" "$result"
              CONN_FAIL=$((CONN_FAIL+1))
            fi
          }

          conn_check_contains() {
            local name="$1" result="$2" expected="$3"
            if echo "$result" | grep -qi "$expected"; then
              printf "  PASS  %-45s %s\n" "$name" "$result"
              CONN_PASS=$((CONN_PASS+1))
            else
              printf "  FAIL  %-45s expected to contain: %s, got: %s\n" "$name" "$expected" "$result"
              CONN_FAIL=$((CONN_FAIL+1))
            fi
          }

          # --- Azure NIC IP Validation ---
          echo "  --- Azure NIC IP Assignment ---"

          MGMT_NIC_IP=$(az network nic show -n nic-vpx-mgmt -g "$RG" \
              --query 'ipConfigurations[0].privateIpAddress' -o tsv 2>/dev/null || echo "MISSING")
          conn_check "Mgmt NIC private IP" "$MGMT_NIC_IP" "10.254.10.10"

          MGMT_NIC_ALLOC=$(az network nic show -n nic-vpx-mgmt -g "$RG" \
              --query 'ipConfigurations[0].privateIpAddressAllocation' -o tsv 2>/dev/null || echo "MISSING")
          conn_check "Mgmt NIC allocation method" "$MGMT_NIC_ALLOC" "Static"

          CLIENT_SNIP_IP=$(az network nic show -n nic-vpx-client -g "$RG" \
              --query "ipConfigurations[?name=='client-snip'].privateIpAddress | [0]" -o tsv 2>/dev/null || echo "MISSING")
          conn_check "Client NIC SNIP private IP" "$CLIENT_SNIP_IP" "10.254.11.10"

          CLIENT_VIP_IP=$(az network nic show -n nic-vpx-client -g "$RG" \
              --query "ipConfigurations[?name=='client-vip'].privateIpAddress | [0]" -o tsv 2>/dev/null || echo "MISSING")
          conn_check "Client NIC VIP private IP" "$CLIENT_VIP_IP" "10.254.11.11"

          CLIENT_VIP_ALLOC=$(az network nic show -n nic-vpx-client -g "$RG" \
              --query "ipConfigurations[?name=='client-vip'].privateIpAddressAllocation | [0]" -o tsv 2>/dev/null || echo "MISSING")
          conn_check "Client NIC VIP allocation method" "$CLIENT_VIP_ALLOC" "Static"

          MGMT_PIP_ASSOC=$(az network nic show -n nic-vpx-mgmt -g "$RG" \
              --query 'ipConfigurations[0].publicIpAddress.id' -o tsv 2>/dev/null || echo "NONE")
          if echo "$MGMT_PIP_ASSOC" | grep -qi "pip-vpx-mgmt"; then
            printf "  PASS  %-45s associated\n" "Mgmt NIC → Public IP"
            CONN_PASS=$((CONN_PASS+1))
          else
            printf "  FAIL  %-45s not associated\n" "Mgmt NIC → Public IP"
            CONN_FAIL=$((CONN_FAIL+1))
          fi

          VIP_PIP_ASSOC=$(az network nic show -n nic-vpx-client -g "$RG" \
              --query "ipConfigurations[?name=='client-vip'].publicIpAddress.id | [0]" -o tsv 2>/dev/null || echo "NONE")
          if echo "$VIP_PIP_ASSOC" | grep -qi "pip-vpx-vip"; then
            printf "  PASS  %-45s associated\n" "Client NIC VIP → Public IP"
            CONN_PASS=$((CONN_PASS+1))
          else
            printf "  FAIL  %-45s not associated\n" "Client NIC VIP → Public IP"
            CONN_FAIL=$((CONN_FAIL+1))
          fi

          echo ""
          # --- SNIP configured (outbound source IP) ---
          echo "  --- SNIP Configuration ---"
          SNIP_STATE=$(curl -sk \
            -H "Content-Type: application/json" \
            -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
            "https://${MGMT_IP}/nitro/v1/config/nsip?filter=type:SNIP" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); ips=d.get('nsip',[]); print(ips[0]['curstate'] if ips else 'MISSING')" 2>/dev/null) || SNIP_STATE="ERROR"
          conn_check "SNIP exists and enabled" "$SNIP_STATE" "ENABLED"

          SNIP_IP=$(curl -sk \
            -H "Content-Type: application/json" \
            -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
            "https://${MGMT_IP}/nitro/v1/config/nsip?filter=type:SNIP" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); ips=d.get('nsip',[]); print(ips[0]['ipaddress'] if ips else 'NONE')" 2>/dev/null) || SNIP_IP="ERROR"
          conn_check "SNIP address" "$SNIP_IP" "10.254.11.10"

          # Verify NSIP via NITRO API matches expected management IP
          NSIP_IP=$(curl -sk \
            -H "Content-Type: application/json" \
            -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
            "https://${MGMT_IP}/nitro/v1/config/nsip?filter=type:NSIP" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); ips=d.get('nsip',[]); print(ips[0]['ipaddress'] if ips else 'NONE')" 2>/dev/null) || NSIP_IP="ERROR"
          conn_check "NSIP address (NITRO)" "$NSIP_IP" "10.254.10.10"

          # --- Backend service group health (proves DNS + TCP + TLS to httpbin.org) ---
          echo ""
          echo "  --- Backend Connectivity (httpbin.org) ---"

          # Wait briefly for service group to stabilize after config
          sleep 15

          SG_STATE=$(curl -sk \
            -H "Content-Type: application/json" \
            -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
            "https://${MGMT_IP}/nitro/v1/stat/servicegroup/sg_backend" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); sg=d.get('servicegroup',[{}]); print(sg[0].get('state','UNKNOWN') if sg else 'MISSING')" 2>/dev/null) || SG_STATE="ERROR"
          conn_check "Service group sg_backend state" "$SG_STATE" "UP"

          # Check individual service group member health
          SG_MEMBERS=$(curl -sk \
            -H "Content-Type: application/json" \
            -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
            "https://${MGMT_IP}/nitro/v1/config/servicegroup_servicegroupmember_binding/sg_backend" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          members = d.get('servicegroup_servicegroupmember_binding', [])
          up = sum(1 for m in members if m.get('svrstate') == 'UP')
          total = len(members)
          print(f'{up}/{total} UP')
          " 2>/dev/null) || SG_MEMBERS="ERROR"
          conn_check_contains "Backend members healthy" "$SG_MEMBERS" "UP"

          # --- LB vserver health (proves full traffic path) ---
          echo ""
          echo "  --- LB vServer Health ---"
          LB_STATE=$(curl -sk \
            -H "Content-Type: application/json" \
            -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
            "https://${MGMT_IP}/nitro/v1/stat/lbvserver/lb_vsrv_https" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); vs=d.get('lbvserver',[{}]); print(vs[0].get('state','UNKNOWN') if vs else 'MISSING')" 2>/dev/null) || LB_STATE="ERROR"
          conn_check "LB vserver lb_vsrv_https state" "$LB_STATE" "UP"

          LB_HEALTH=$(curl -sk \
            -H "Content-Type: application/json" \
            -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
            "https://${MGMT_IP}/nitro/v1/stat/lbvserver/lb_vsrv_https" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); vs=d.get('lbvserver',[{}]); print(vs[0].get('health','0') if vs else '0')" 2>/dev/null) || LB_HEALTH="0"
          conn_check "LB vserver health" "$LB_HEALTH" "100"

          # --- Live traffic test through VIP ---
          echo ""
          echo "  --- Live Traffic Test ---"
          VIP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            "https://${VIP}/get" 2>/dev/null) || VIP_CODE="000"
          conn_check "VIP HTTPS /get (end-to-end)" "$VIP_CODE" "200"

          # Verify VPX can serve HTTP→HTTPS redirect
          REDIR_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            "http://${VIP}/" 2>/dev/null) || REDIR_CODE="000"
          conn_check "VIP HTTP→HTTPS redirect" "$REDIR_CODE" "301"

          # Verify response includes backend data (proves full proxy path)
          BACKEND_BODY=$(curl -sk --connect-timeout 10 --max-time 30 \
            "https://${VIP}/get" 2>/dev/null) || BACKEND_BODY=""
          if echo "$BACKEND_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK' if 'origin' in d else 'FAIL')" 2>/dev/null | grep -q "OK"; then
            printf "  PASS  %-45s httpbin.org response verified\n" "Backend proxy response body"
            CONN_PASS=$((CONN_PASS+1))
          else
            printf "  FAIL  %-45s no valid httpbin response\n" "Backend proxy response body"
            CONN_FAIL=$((CONN_FAIL+1))
          fi

          # --- DNS resolution from VPX ---
          echo ""
          echo "  --- VPX DNS Resolution ---"
          DNS_CHECK=$(curl -sk \
            -H "Content-Type: application/json" \
            -H "X-NITRO-USER: nsroot" -H "X-NITRO-PASS: ${NSROOT_PW}" \
            "https://${MGMT_IP}/nitro/v1/config/dnsnameserver" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          servers = d.get('dnsnameserver', [])
          if servers:
              print(','.join(s.get('ip','?') for s in servers))
          else:
              print('NONE')
          " 2>/dev/null) || DNS_CHECK="ERROR"
          if [ "$DNS_CHECK" != "NONE" ] && [ "$DNS_CHECK" != "ERROR" ]; then
            printf "  PASS  %-45s %s\n" "DNS nameservers configured" "$DNS_CHECK"
            CONN_PASS=$((CONN_PASS+1))
          else
            printf "  FAIL  %-45s %s\n" "DNS nameservers configured" "$DNS_CHECK"
            CONN_FAIL=$((CONN_FAIL+1))
          fi

          echo ""
          echo "  ==========================================="
          printf "  Connectivity: %d passed, %d failed\n" "$CONN_PASS" "$CONN_FAIL"
          if [ "$CONN_FAIL" -gt 0 ]; then
            echo "  WARNING: VPX outbound connectivity issues detected"
          else
            echo "  VPX fully operational — outbound connectivity verified"
          fi
          echo "  ==========================================="

          # Save results
          echo "{\"passed\":$CONN_PASS,\"failed\":$CONN_FAIL}" > /tmp/dr-test/connectivity-check.json

      - name: "Stop data plane saturation probe"
        run: |
          if [ -f /tmp/dr-test/saturation.pid ]; then
            PROBE_PID=$(cat /tmp/dr-test/saturation.pid)
            kill "$PROBE_PID" 2>/dev/null || true
            wait "$PROBE_PID" 2>/dev/null || true
            echo "  Saturation probe stopped (PID: $PROBE_PID)"

            TOTAL=$(grep -v '^#' /tmp/dr-test/saturation.csv | wc -l)
            SUCCESS=$(grep -v '^#' /tmp/dr-test/saturation.csv | grep ',200,' | wc -l)
            FAILURE=$((TOTAL - SUCCESS))
            echo "  Total probes: $TOTAL, Success: $SUCCESS, Failed: $FAILURE"
          fi

      - name: "DR Phase 5 — Recovery test suite"
        run: |
          MGMT_IP="${{ needs.deploy.outputs.mgmt_public_ip }}"
          VIP="${{ needs.deploy.outputs.vip_public_ip }}"
          NSROOT_PW="${{ secrets.NSROOT_PASSWORD }}"
          echo "::add-mask::$NSROOT_PW"

          echo "==========================================="
          echo "  DR Phase 5 — Running Recovery Tests"
          echo "==========================================="

          date -u +%s > /tmp/dr-test/t7_test_start

          cd scripts
          chmod +x run-comprehensive-tests.sh
          ./run-comprehensive-tests.sh "${MGMT_IP}" "${NSROOT_PW}" "${VIP}" 2>&1 | tee /tmp/dr-test/recovery.log || true

          date -u +%s > /tmp/dr-test/t8_test_end

      - name: "DR Phase 6 — Generate DR report"
        run: |
          cd ${{ github.workspace }}
          python3 scripts/dr-report.py \
            --baseline /tmp/dr-test/baseline.log \
            --recovery /tmp/dr-test/recovery.log \
            --timestamps /tmp/dr-test \
            --saturation /tmp/dr-test/saturation.csv \
            --output /tmp/dr-test/dr-report.json \
            --rto-threshold 600 \
            --vm-recovery-threshold 360 \
            --api-warmup-threshold 300 \
            --config-threshold 120

      - name: Upload DR report to Azure Storage
        if: always()
        run: |
          SA_NAME="${{ needs.deploy.outputs.storage_account }}"
          RG_NAME="${{ needs.deploy.outputs.resource_group }}"
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          RUN_ID="${{ github.run_id }}"

          SA_KEY=$(az storage account keys list \
            --account-name "$SA_NAME" --resource-group "$RG_NAME" \
            --query "[0].value" -o tsv 2>/dev/null) || true

          if [ -n "$SA_KEY" ]; then
            for FILEPATH in /tmp/dr-test/*; do
              [ -s "$FILEPATH" ] || continue
              BASENAME=$(basename "$FILEPATH")
              az storage blob upload \
                --account-name "$SA_NAME" \
                --account-key "$SA_KEY" \
                --container-name "vpx-logs" \
                --name "dr-test-${RUN_ID}/${TIMESTAMP}/${BASENAME}" \
                --file "$FILEPATH" \
                --overwrite --output none 2>/dev/null || true
            done
            echo "  Uploaded to: ${SA_NAME}/vpx-logs/dr-test-${RUN_ID}/${TIMESTAMP}/"
          fi

          rm -rf /tmp/dr-test
